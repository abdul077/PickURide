<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideChatHub Location Test - PickURide</title>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-left: 3px solid #667eea;
            padding-left: 12px;
        }

        .log-entry.success {
            border-left-color: #28a745;
            color: #90ee90;
        }

        .log-entry.error {
            border-left-color: #dc3545;
            color: #ff6b6b;
        }

        .log-entry.info {
            border-left-color: #17a2b8;
            color: #7dd3fc;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .clear-btn {
            background: #6c757d;
            color: white;
            margin-top: 10px;
        }

        .clear-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 RideChatHub Location Test</h1>
            <p>Test Driver Location Updates via SignalR</p>
        </div>

        <div class="content">
            <!-- Connection Status -->
            <div class="section">
                <h2>Connection Status</h2>
                <div id="status" class="status disconnected">Disconnected</div>
                <button id="connectBtn" class="btn btn-success" onclick="connect()">Connect</button>
                <button id="disconnectBtn" class="btn btn-danger" onclick="disconnect()" disabled>Disconnect</button>
            </div>

            <!-- Connection Settings -->
            <div class="section">
                <h2>Connection Settings</h2>
                <div class="form-group">
                    <label for="hubUrl">Hub URL:</label>
                    <input type="text" id="hubUrl" value="http://localhost:5192/ridechathub" placeholder="http://localhost:5192/ridechathub">
                </div>
            </div>

            <!-- Location Update -->
            <div class="section">
                <h2>Update Driver Location</h2>
                <div class="grid">
                    <div class="form-group">
                        <label for="rideId">Ride ID (Guid):</label>
                        <input type="text" id="rideId" placeholder="00000000-0000-0000-0000-000000000000">
                    </div>
                    <div class="form-group">
                        <label for="driverId">Driver ID (Guid):</label>
                        <input type="text" id="driverId" placeholder="00000000-0000-0000-0000-000000000000">
                    </div>
                    <div class="form-group">
                        <label for="latitude">Latitude:</label>
                        <input type="number" id="latitude" step="0.000001" placeholder="43.6532" value="43.6532">
                    </div>
                    <div class="form-group">
                        <label for="longitude">Longitude:</label>
                        <input type="number" id="longitude" step="0.000001" placeholder="-79.3832" value="-79.3832">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="updateLocation()">Update Location</button>
                <button class="btn btn-primary" onclick="getLiveLocations()">Get Live Locations</button>
                <button class="btn btn-primary" onclick="startAutoUpdate()">Start Auto Update</button>
                <button class="btn btn-danger" onclick="stopAutoUpdate()">Stop Auto Update</button>
            </div>

            <!-- Location Groups -->
            <div class="section">
                <h2>Location Group Management</h2>
                <div class="form-group">
                    <label for="groupRideId">Ride ID for Group:</label>
                    <input type="text" id="groupRideId" placeholder="00000000-0000-0000-0000-000000000000">
                </div>
                <button class="btn btn-success" onclick="joinLocationGroup()">Join Location Group</button>
                <button class="btn btn-danger" onclick="leaveLocationGroup()">Leave Location Group</button>
            </div>

            <!-- Event Log -->
            <div class="section">
                <h2>Event Log</h2>
                <button class="btn clear-btn" onclick="clearLog()">Clear Log</button>
                <div id="log" class="log-container"></div>
            </div>
        </div>
    </div>

    <script>
        let connection = null;
        let autoUpdateInterval = null;

        function log(message, type = 'info') {
            const logContainer = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function updateStatus(status, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${status}`;
            statusEl.textContent = message;
            
            document.getElementById('connectBtn').disabled = status === 'connected' || status === 'connecting';
            document.getElementById('disconnectBtn').disabled = status === 'disconnected';
        }

        async function connect() {
            const hubUrl = document.getElementById('hubUrl').value;
            
            if (!hubUrl) {
                alert('Please enter a Hub URL');
                return;
            }

            try {
                updateStatus('connecting', 'Connecting...');
                log(`Connecting to ${hubUrl}...`, 'info');

                connection = new signalR.HubConnectionBuilder()
                    .withUrl(hubUrl)
                    .build();

                // Register event handlers
                connection.on("ReceiveLocation", (payload) => {
                    log(`📍 Location Received (All): ${JSON.stringify(payload)}`, 'success');
                });

                connection.on("ReceiveRideLocation", (payload) => {
                    log(`📍 Ride Location Received: ${JSON.stringify(payload)}`, 'success');
                });

                connection.on("JoinedLocationGroup", (rideId) => {
                    log(`✅ Joined Location Group: ${rideId}`, 'success');
                });

                connection.on("LeftLocationGroup", (rideId) => {
                    log(`❌ Left Location Group: ${rideId}`, 'info');
                });

                connection.on("ReceiveLiveLocations", (locations) => {
                    log(`📍 Live Locations Received: ${JSON.stringify(locations)}`, 'success');
                });

                connection.onclose(() => {
                    updateStatus('disconnected', 'Disconnected');
                    log('Connection closed', 'error');
                });

                await connection.start();
                updateStatus('connected', 'Connected');
                log('✅ Successfully connected to RideChatHub!', 'success');
            } catch (error) {
                updateStatus('disconnected', 'Connection Failed');
                log(`❌ Connection error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function disconnect() {
            if (connection) {
                stopAutoUpdate();
                await connection.stop();
                connection = null;
                updateStatus('disconnected', 'Disconnected');
                log('Disconnected from RideChatHub', 'info');
            }
        }

        async function updateLocation() {
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                alert('Please connect first');
                return;
            }

            const rideId = document.getElementById('rideId').value;
            const driverId = document.getElementById('driverId').value;
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);

            if (!rideId || !driverId || isNaN(latitude) || isNaN(longitude)) {
                alert('Please fill in all fields');
                return;
            }

            try {
                await connection.invoke("UpdateLocation", rideId, driverId, latitude, longitude);
                log(`📤 Sent location update: RideId=${rideId}, DriverId=${driverId}, Lat=${latitude}, Lng=${longitude}`, 'info');
            } catch (error) {
                log(`❌ Error updating location: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function startAutoUpdate() {
            if (autoUpdateInterval) {
                return;
            }

            const rideId = document.getElementById('rideId').value;
            const driverId = document.getElementById('driverId').value;

            if (!rideId || !driverId) {
                alert('Please enter Ride ID and Driver ID first');
                return;
            }

            let lat = parseFloat(document.getElementById('latitude').value) || 43.6532;
            let lng = parseFloat(document.getElementById('longitude').value) || -79.3832;

            autoUpdateInterval = setInterval(() => {
                // Simulate movement (small random changes)
                lat += (Math.random() - 0.5) * 0.001;
                lng += (Math.random() - 0.5) * 0.001;
                
                document.getElementById('latitude').value = lat.toFixed(6);
                document.getElementById('longitude').value = lng.toFixed(6);
                
                updateLocation();
            }, 2000); // Update every 2 seconds

            log('🔄 Auto-update started (every 2 seconds)', 'info');
        }

        function stopAutoUpdate() {
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
                log('⏹️ Auto-update stopped', 'info');
            }
        }

        async function getLiveLocations() {
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                alert('Please connect first');
                return;
            }

            try {
                await connection.invoke("GetLiveLocations");
                log(`📤 Requesting live locations...`, 'info');
            } catch (error) {
                log(`❌ Error getting live locations: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function joinLocationGroup() {
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                alert('Please connect first');
                return;
            }

            const rideId = document.getElementById('groupRideId').value;
            if (!rideId) {
                alert('Please enter a Ride ID');
                return;
            }

            try {
                await connection.invoke("JoinLocationGroup", rideId);
                log(`📤 Joining location group: ${rideId}`, 'info');
            } catch (error) {
                log(`❌ Error joining group: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function leaveLocationGroup() {
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                alert('Please connect first');
                return;
            }

            const rideId = document.getElementById('groupRideId').value;
            if (!rideId) {
                alert('Please enter a Ride ID');
                return;
            }

            try {
                await connection.invoke("LeaveLocationGroup", rideId);
                log(`📤 Leaving location group: ${rideId}`, 'info');
            } catch (error) {
                log(`❌ Error leaving group: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // Generate sample GUIDs on page load
        function generateGuid() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Set sample GUIDs
        window.onload = function() {
            document.getElementById('rideId').value = generateGuid();
            document.getElementById('driverId').value = generateGuid();
            document.getElementById('groupRideId').value = document.getElementById('rideId').value;
        };
    </script>
</body>
</html>
