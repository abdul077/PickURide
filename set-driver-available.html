<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Driver Available - PickURide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .api-url-group {
            margin-bottom: 25px;
        }

        .api-url-group label {
            color: #666;
            font-size: 13px;
        }

        .api-url-input {
            font-size: 13px;
            background-color: #f5f5f5;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .response {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        .response.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .response.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .example {
            margin-top: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .example strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Set Driver Available</h1>
        <p class="subtitle">Update driver status to Available</p>

        <form id="driverForm">
            <div class="api-url-group">
                <label for="apiUrl">API Base URL:</label>
                <input 
                    type="text" 
                    id="apiUrl" 
                    placeholder="https://your-api-url.com" 
                    value="http://localhost:5192"
                    class="api-url-input"
                />
            </div>

            <div class="form-group">
                <label for="driverId">Driver ID (GUID):</label>
                <input 
                    type="text" 
                    id="driverId" 
                    placeholder="e.g., 123e4567-e89b-12d3-a456-426614174000" 
                    required
                />
                <div class="example">
                    <strong>Example:</strong> 123e4567-e89b-12d3-a456-426614174000
                </div>
            </div>

            <button type="submit" id="submitBtn">Set Driver Available</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div class="response" id="response"></div>
    </div>

    <script>
        const form = document.getElementById('driverForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const response = document.getElementById('response');
        const driverIdInput = document.getElementById('driverId');
        const apiUrlInput = document.getElementById('apiUrl');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const driverId = driverIdInput.value.trim();
            const apiUrl = apiUrlInput.value.trim().replace(/\/$/, ''); // Remove trailing slash

            // Validate GUID format
            const guidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            if (!guidRegex.test(driverId)) {
                showResponse('Please enter a valid GUID format for Driver ID', 'error');
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            loading.classList.add('show');
            response.classList.remove('success', 'error');
            response.style.display = 'none';

            try {
                const endpoint = `${apiUrl}/api/Drivers/set-available-anonymous`;
                
                const responseData = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        driverId: driverId
                    })
                });

                const data = await responseData.json();

                if (responseData.ok) {
                    showResponse(
                        `✅ Success! ${data.message || 'Driver status updated to Available'}`,
                        'success'
                    );
                } else {
                    showResponse(
                        `❌ Error: ${data.message || 'Failed to update driver status'}`,
                        'error'
                    );
                }
            } catch (error) {
                showResponse(
                    `❌ Network Error: ${error.message}\n\nMake sure:\n- The API is running\n- The API URL is correct\n- CORS is properly configured`,
                    'error'
                );
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        function showResponse(message, type) {
            response.textContent = message;
            response.className = `response ${type}`;
            response.style.display = 'block';
        }

        // Auto-focus on driver ID input
        driverIdInput.focus();
    </script>
</body>
</html>
