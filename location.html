<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Location Tracker - PickURide</title>
    <script src="https://unpkg.com/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .location-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
        }

        .location-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .location-info p {
            margin: 5px 0;
            color: #666;
        }

        .location-info strong {
            color: #333;
        }

        .hidden {
            display: none;
        }

        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .connection-status.connected {
            background: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
        }

        .connection-status.disconnected {
            background: #dc3545;
        }

        .connection-status.connecting {
            background: #ffc107;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .api-url-group {
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #dc3545;
            margin-top: 10px;
        }

        .logout-btn:hover:not(:disabled) {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Driver Location Tracker</h1>
        <p class="subtitle">Auto location updates via SignalR</p>

        <!-- Login Form -->
        <div id="loginSection">
            <div class="form-group api-url-group">
                <label for="apiUrl">API Base URL:</label>
                <input type="text" id="apiUrl" placeholder="http://localhost:5192" value="http://localhost:5192">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="driver@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="deviceToken">Device Token (Optional):</label>
                <input type="text" id="deviceToken" placeholder="Device token (optional)">
            </div>

            <button id="loginBtn" onclick="login()">Login</button>
            <div id="loginStatus"></div>
        </div>

        <!-- Location Tracker Section -->
        <div id="trackerSection" class="hidden">
            <div class="status info">
                <span class="connection-status" id="connectionStatus"></span>
                <span id="connectionText">Connecting...</span>
            </div>

            <div class="location-info">
                <h3>Location Information</h3>
                <p><strong>Driver ID:</strong> <span id="driverId">-</span></p>
                <p><strong>Driver Name:</strong> <span id="driverName">-</span></p>
                <p><strong>Latitude:</strong> <span id="latitude">-</span></p>
                <p><strong>Longitude:</strong> <span id="longitude">-</span></p>
                <p><strong>Last Update:</strong> <span id="lastUpdate">-</span></p>
                <p><strong>Ride ID:</strong> <span id="rideId">-</span></p>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="rideIdInput">Ride ID (Optional - for ride-specific tracking):</label>
                <input type="text" id="rideIdInput" value="00000000-0000-0000-0000-000000000000" placeholder="Enter Ride ID (optional)">
            </div>

            <button id="startTrackingBtn" onclick="startLocationTracking()">Start Location Tracking</button>
            <button id="stopTrackingBtn" onclick="stopLocationTracking()" class="hidden">Stop Location Tracking</button>
            <button class="logout-btn" onclick="logout()">Logout</button>

            <div id="trackerStatus"></div>
        </div>
    </div>

    <script>
        let connection = null;
        let watchId = null;
        let apiBaseUrl = '';
        let jwtToken = '';
        let driverId = '';
        let driverName = '';
        let currentRideId = null;

        // Load saved credentials if available
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('jwtToken');
            const savedApiUrl = localStorage.getItem('apiUrl');
            const savedDriverId = localStorage.getItem('driverId');
            const savedDriverName = localStorage.getItem('driverName');

            if (savedToken && savedApiUrl) {
                apiBaseUrl = savedApiUrl;
                jwtToken = savedToken;
                driverId = savedDriverId || '';
                driverName = savedDriverName || '';
                document.getElementById('apiUrl').value = savedApiUrl;
                showTrackerSection();
                connectToSignalR();
            }
        });

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const deviceToken = document.getElementById('deviceToken').value || '';
            apiBaseUrl = document.getElementById('apiUrl').value.trim();

            if (!email || !password || !apiBaseUrl) {
                showStatus('loginStatus', 'Please fill in all required fields', 'error');
                return;
            }

            // Remove trailing slash from API URL
            apiBaseUrl = apiBaseUrl.replace(/\/$/, '');

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${apiBaseUrl}/api/Drivers/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        deviceToken: deviceToken
                    })
                });

                const data = await response.json();

                if (data.token && data.message === 'Login successful' && data.approvalStatus === 'Approved') {
                    jwtToken = data.token;
                    driverId = data.userId;
                    driverName = data.fullName || 'Driver';

                    // Save to localStorage
                    localStorage.setItem('jwtToken', jwtToken);
                    localStorage.setItem('apiUrl', apiBaseUrl);
                    localStorage.setItem('driverId', driverId);
                    localStorage.setItem('driverName', driverName);

                    showStatus('loginStatus', `Login successful! Welcome, ${driverName}`, 'success');
                    
                    setTimeout(() => {
                        showTrackerSection();
                        connectToSignalR();
                    }, 1000);
                } else {
                    showStatus('loginStatus', data.message || 'Login failed. Please check your credentials.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showStatus('loginStatus', `Error: ${error.message}. Make sure the API URL is correct.`, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        }

        function showTrackerSection() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('trackerSection').classList.remove('hidden');
            document.getElementById('driverId').textContent = driverId;
            document.getElementById('driverName').textContent = driverName;
        }

        function connectToSignalR() {
            const hubUrl = `${apiBaseUrl}/ridechathub`;

            console.log('🔗 Connecting to SignalR at:', hubUrl);
            console.log('🔑 Using JWT token:', jwtToken ? 'Present' : 'Missing');

            updateConnectionStatus('connecting', 'Connecting to SignalR...');

            connection = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl, {
                    accessTokenFactory: () => jwtToken,
                    skipNegotiation: false,
                    transport: signalR.HttpTransportType.WebSockets | signalR.HttpTransportType.ServerSentEvents | signalR.HttpTransportType.LongPolling
                })
                .withAutomaticReconnect({
                    nextRetryDelayInMilliseconds: retryContext => {
                        if (retryContext.previousRetryCount === 0) return 0;
                        if (retryContext.previousRetryCount === 1) return 2000;
                        if (retryContext.previousRetryCount === 2) return 10000;
                        return 30000;
                    }
                })
                .configureLogging(signalR.LogLevel.Warning)
                .build();

            // Connection event handlers
            connection.onclose(() => {
                updateConnectionStatus('disconnected', 'Disconnected from SignalR');
            });

            connection.onreconnecting(() => {
                updateConnectionStatus('connecting', 'Reconnecting to SignalR...');
            });

            connection.onreconnected(() => {
                updateConnectionStatus('connected', 'Connected to SignalR');
                showStatus('trackerStatus', 'Reconnected successfully', 'success');
            });

            // Location update handlers
            connection.on('ReceiveLocation', (data) => {
                console.log('Received location update:', data);
            });

            connection.on('ReceiveRideLocation', (data) => {
                console.log('Received ride location update:', data);
            });

            connection.on('ReceiveAllLocation', (data) => {
                console.log('Received all location update:', data);
            });

            connection.on('ReceiveLiveLocations', (data) => {
                console.log('Received live locations:', data);
            });

            // Start connection
            connection.start()
                .then(() => {
                    console.log('✅ SignalR connection established successfully');
                    updateConnectionStatus('connected', 'Connected to SignalR');
                    showStatus('trackerStatus', 'SignalR connection established', 'success');
                })
                .catch(err => {
                    console.error('❌ SignalR connection error:', err);
                    console.error('Error details:', {
                        message: err.message,
                        stack: err.stack,
                        statusCode: err.statusCode,
                        context: err.context
                    });
                    updateConnectionStatus('disconnected', 'Failed to connect to SignalR');
                    showStatus('trackerStatus', `Connection error: ${err.message}`, 'error');
                });
        }

        function updateConnectionStatus(status, text) {
            const statusElement = document.getElementById('connectionStatus');
            const textElement = document.getElementById('connectionText');
            
            statusElement.className = `connection-status ${status}`;
            textElement.textContent = text;
        }

        function startLocationTracking() {
            if (!navigator.geolocation) {
                showStatus('trackerStatus', 'Geolocation is not supported by your browser', 'error');
                return;
            }

            const rideIdInput = document.getElementById('rideIdInput').value.trim();
            if (rideIdInput) {
                currentRideId = rideIdInput;
                document.getElementById('rideId').textContent = currentRideId;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    document.getElementById('latitude').textContent = lat.toFixed(6);
                    document.getElementById('longitude').textContent = lng.toFixed(6);
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

                    // Send location update to SignalR
                    if (connection && connection.state === signalR.HubConnectionState.Connected) {
                        if (currentRideId) {
                            // Use UpdateLocationWithDriverName for ride-specific tracking
                            connection.invoke('UpdateLocationWithDriverName', currentRideId, driverId, driverName, lat, lng)
                                .catch(err => {
                                    console.error('Error sending location with driver name:', err);
                                    // Fallback to UpdateLocation
                                    connection.invoke('UpdateLocation', currentRideId, driverId, lat, lng)
                                        .catch(err2 => console.error('Error sending location:', err2));
                                });
                        } else {
                            // For general location tracking, we still need a rideId
                            // You might want to create a default ride or handle this differently
                            showStatus('trackerStatus', 'Please enter a Ride ID to track location', 'warning');
                        }
                    } else {
                        showStatus('trackerStatus', 'SignalR not connected. Waiting for connection...', 'warning');
                    }
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    let errorMsg = 'Unknown error';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Location permission denied. Please enable location access.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Location information unavailable.';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Location request timed out.';
                            break;
                    }
                    showStatus('trackerStatus', errorMsg, 'error');
                },
                options
            );

            document.getElementById('startTrackingBtn').classList.add('hidden');
            document.getElementById('stopTrackingBtn').classList.remove('hidden');
            showStatus('trackerStatus', 'Location tracking started', 'success');
        }

        function stopLocationTracking() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            document.getElementById('startTrackingBtn').classList.remove('hidden');
            document.getElementById('stopTrackingBtn').classList.add('hidden');
            showStatus('trackerStatus', 'Location tracking stopped', 'info');
        }

        function logout() {
            stopLocationTracking();
            
            if (connection) {
                connection.stop();
                connection = null;
            }

            // Clear localStorage
            localStorage.removeItem('jwtToken');
            localStorage.removeItem('apiUrl');
            localStorage.removeItem('driverId');
            localStorage.removeItem('driverName');

            // Reset variables
            jwtToken = '';
            driverId = '';
            driverName = '';
            apiBaseUrl = '';
            currentRideId = null;

            // Show login section
            document.getElementById('trackerSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('loginStatus').innerHTML = '';
            document.getElementById('trackerStatus').innerHTML = '';
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = `status ${type}`;
            element.textContent = message;
            element.classList.remove('hidden');
        }
    </script>
</body>
</html>
